<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox · Directive Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;700&display=swap">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <span class="brand">DIRECTIVE STREAM<em>·</em>SECTOR 06</span>
  <span class="status" id="statusLine">establishing uplink...</span>
</nav>

<main>
  <!-- Quick-add -->
  <div class="qa">
    <div class="qa-label">📡 NEW DIRECTIVE</div>
    <input type="text" id="qaTitle" placeholder="what needs doing?" autocomplete="off">
    <div class="qa-row">
      <div class="qa-labels" id="qaLabels"></div>
      <button class="qa-submit" id="qaSubmit">TRANSMIT</button>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- Active list -->
  <div class="list-head">
    <h2>Active</h2>
    <span class="count-badge"><span id="count">0</span> OPEN</span>
  </div>
  <div id="list">
    <div class="loading">scanning stream...</div>
  </div>

  <!-- Recently completed -->
  <div class="completed-section">
    <div class="list-head">
      <h2>Recently closed</h2>
    </div>
    <div id="closedList"></div>
  </div>
</main>

<footer>
  <span>Erin Cross · X = Consulting</span>
  <a href="https://cf-examples.pages.dev">← portfolio</a>
</footer>

<script src="/app.js"></script>
</body>
</html>
